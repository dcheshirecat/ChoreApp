name: Build Chore Champion APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK components ─────────────────────────────────────────────
      # ubuntu-latest already has ANDROID_HOME set up with cmdline-tools.
      # We just install the platform and build-tools we need.
      - name: Install Android SDK components
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" \
            --sdk_root="$ANDROID_HOME" 2>/dev/null || true

      # ── 4. Install Gradle 8.6 via official action (reliable, no wrapper JAR needed)
      - name: Set up Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # ── 5. Generate all Android project files ─────────────────────────────────
      # Files are embedded as base64 JSON to avoid ANY shell/YAML quoting issues.
      # This is the only 100% reliable way to write Java/XML/Gradle files from
      # a GitHub Actions workflow without heredoc indentation corruption.
      - name: Generate Android project files
        env:
          FILES_B64: >-
            
        run: |
          python3 -c "
import base64, json, os
data = json.loads(base64.b64decode(os.environ['FILES_B64']).decode())
for path, content in data.items():
    os.makedirs(os.path.dirname(path), exist_ok=True)
    open(path, 'w').write(content)
    print('Wrote', path)
"

      # ── 6. Copy web app into Android assets ──────────────────────────────────
      - name: Copy index.html into assets
        run: |
          mkdir -p ChoreChampion/app/src/main/assets
          cp index.html ChoreChampion/app/src/main/assets/index.html

      # ── 7. Generate signing keystore ─────────────────────────────────────────
      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -keystore ChoreChampion/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=ChoreChampion,OU=App,O=Personal,L=Home,ST=Home,C=US" \
            -noprompt

      # ── 8. Build the APK ─────────────────────────────────────────────────────
      - name: Build Release APK
        working-directory: ChoreChampion
        run: gradle assembleRelease --no-daemon --stacktrace

      # ── 9. Collect and upload APK ────────────────────────────────────────────
      - name: Collect APK
        run: |
          APK=$(find ChoreChampion/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK found: $APK"
          cp "$APK" ChoreChampion-v1.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChoreChampion-APK
          path: ChoreChampion-v1.0.apk
          retention-days: 30
