      - name: Copy index.html into assets
        run: |
          mkdir -p ChoreChampion/app/src/main/assets
          cp index.html ChoreChampion/app/src/main/assets/index.html

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -keystore ChoreChampion/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=ChoreChampion,OU=App,O=Personal,L=Home,ST=Home,C=US" \
            -noprompt

      - name: Build Release APK
        working-directory: ChoreChampion
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Collect APK
        run: |
          APK=$(find ChoreChampion/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found: $APK"
          cp "$APK" ChoreChampion-v1.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChoreChampion-APK
          path: ChoreChampion-v1.0.apk
          retention-days: 30
